# Собирает образ Ёжика и публикует в ghcr.io/illiyanibl/hedgehog:latest.
# Использует встроенный GITHUB_TOKEN (packages: write) — секретов не нужно.
# После первого прогона сделай пакет публичным:
#   GitHub → профиль → Packages → hedgehog → Package settings →
#   Change visibility → Public (тогда docker pull работает без логина).
name: publish-image

on:
  push:
    branches: [main]
    paths:
      - 'hedgehog/**'
      - 'requirements.txt'
      - 'pyproject.toml'
      - 'deploy/Dockerfile'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: ghcr.io/illiyanibl/hedgehog:latest
